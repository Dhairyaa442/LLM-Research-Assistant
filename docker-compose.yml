version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload

  ui:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8501
    depends_on:
      - api
